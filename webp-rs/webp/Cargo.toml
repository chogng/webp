[package]
name = "webp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Public safe-Rust WebP API"

[lints]
workspace = true

[features]
default = ["decode", "encode", "animation"]
# Static image decode, inspection, and incremental decode APIs.
decode = ["dep:webp-decode", "webp-decode/decode"]
# Static image encode APIs.
encode = ["dep:webp-encode"]
# Animated APIs for whichever directions are enabled.
animation = ["decode", "webp-decode/animation", "webp-encode?/animation"]
fuzzing = ["decode", "encode", "animation", "webp-decode/fuzzing"]
alpha-benchmark-internals = ["fuzzing", "webp-encode/alpha-benchmark-internals"]

[dependencies]
webp-decode = { path = "../decode", default-features = false, optional = true }
webp-encode = { path = "../encode", default-features = false, optional = true }

[dev-dependencies]
webp-container = { path = "../container" }
webp-demux = { path = "../demux" }

[[example]]
name = "alpha_encode_bench"
required-features = ["fuzzing"]

[[example]]
name = "animation_encode_bench"
required-features = ["animation", "encode"]

[[example]]
name = "decode_bench"
required-features = ["decode"]

[[example]]
name = "encode_bench"
required-features = ["encode"]

[[example]]
name = "vp8_encode_bench"
required-features = ["encode"]

[[example]]
name = "vp8l_color_transform_reproducer"
required-features = ["encode"]
