# Schema for externally fetched test corpora and C/C++ oracle builds.
#
# These sources intentionally follow their upstream default branch. Fetchers
# print the resolved commit for each run; generated sidecars retain that commit
# as provenance. A release can retain its run log when it needs a replayable
# snapshot, without preventing routine corpus refreshes.
schema_version = 2

[libwebp]
source_url = "https://chromium.googlesource.com/webm/libwebp"
branch = "main"
build_profile = "scalar-canonical-v1"
compiler = "system-clang-or-gcc"

[libwebp_test_data]
source_url = "https://chromium.googlesource.com/webm/libwebp-test-data"
branch = "main"
purpose = "upstream conformance vectors"

[clic]
version = "tfds:clic:1.0.0"
splits = ["validation"]
purpose = "rate-distortion and performance benchmark"
