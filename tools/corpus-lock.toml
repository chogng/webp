# Schema for externally fetched test corpora and C/C++ oracle builds.
#
# Each fetched source is pinned to an immutable commit. Maintainers check for
# upstream commits and advance a pin deliberately. Ordinary CI and releases
# never consume an unreviewed upstream tip.
[libwebp]
source_url = "https://chromium.googlesource.com/webm/libwebp"
commit = "733c91e461c18cf1127c9ed0a80dccbcfed599d3"
tracking_branch = "main" # used only by manual update tooling
build_profile = "scalar-canonical-v1"
compiler = "system-clang-or-gcc"

[libwebp_test_data]
source_url = "https://chromium.googlesource.com/webm/libwebp-test-data"
commit = "06ddd96e276c2c638a72d39d3c0f340afd61978c"
tracking_branch = "main" # used by the manual check and update scripts
purpose = "upstream conformance vectors"

[clic]
version = "tfds:clic:1.0.0"
splits = ["validation"]
purpose = "rate-distortion and performance benchmark"
# TFDS downloads the source archive before exposing the validation split.
estimated_download_gib = 7.48
estimated_workspace_gib = 14.96
